name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: npm run dist:win
            artifact: release/*.exe
            name: windows
          - os: macos-latest
            command: npm run dist:mac
            artifact: release/*.dmg
            name: macos
          - os: ubuntu-latest
            command: npm run dist:linux
            artifact: release/*.AppImage
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package DNScope
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ${{ matrix.command }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: DNScope-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v$(node -p 'require("./package.json").version')"
          fi
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" artifacts/**/* --clobber
          else
            gh release create "${VERSION}" artifacts/**/* --target "${GITHUB_SHA}" --generate-notes --title "DNScope ${VERSION}"
          fi
